<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" style="background-color:#f0f0f0; font-family: Arial, sans-serif;">
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="bold">Trae Controller - Wiring Diagram (Enhanced Safety)</text>
  
  <!-- Definitions for gradients and markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
    <linearGradient id="grad_pcb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad_lcd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ================= COMPONENTS ================= -->

  <!-- 1. Power Supply 12V -->
  <g transform="translate(50, 100)">
    <rect width="120" height="150" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2" rx="5" />
    <text x="60" y="30" text-anchor="middle" font-weight="bold">PSU 12V</text>
    <text x="60" y="50" text-anchor="middle" font-size="12">AC to DC</text>
    <!-- Terminals -->
    <rect x="80" y="110" width="30" height="30" fill="#f1c40f" stroke="#f39c12" />
    <text x="95" y="130" text-anchor="middle" font-size="10">V+</text>
    <rect x="10" y="110" width="30" height="30" fill="#2c3e50" stroke="#000" />
    <text x="25" y="130" text-anchor="middle" fill="white" font-size="10">V-</text>
  </g>

  <!-- 2. Buck Converter (12V to 5V) -->
  <g transform="translate(200, 150)">
    <rect width="100" height="60" fill="#27ae60" stroke="#2ecc71" stroke-width="2" rx="2" />
    <text x="50" y="25" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Buck Conv.</text>
    <text x="50" y="40" text-anchor="middle" fill="white" font-size="10">12V -> 5V</text>
    <!-- Pins -->
    <circle cx="10" cy="30" r="4" fill="#f1c40f" /><text x="10" y="15" font-size="8" fill="white">IN+</text>
    <circle cx="10" cy="50" r="4" fill="black" /><text x="10" y="65" font-size="8" fill="white">IN-</text>
    <circle cx="90" cy="30" r="4" fill="#e74c3c" /><text x="90" y="15" font-size="8" fill="white">OUT+</text>
    <circle cx="90" cy="50" r="4" fill="black" /><text x="90" y="65" font-size="8" fill="white">OUT-</text>
  </g>

  <!-- 3. ESP32-S3 Board -->
  <g transform="translate(450, 200)">
    <rect width="200" height="400" fill="url(#grad_pcb)" stroke="#34495e" stroke-width="3" rx="10" />
    <text x="100" y="30" text-anchor="middle" fill="white" font-weight="bold" font-size="16">ESP32-S3</text>
    <rect x="60" y="60" width="80" height="80" fill="#7f8c8d" /> <!-- MCU -->
    
    <!-- Left Pins (Power & Control) -->
    <g font-size="10" fill="white" text-anchor="end">
        <text x="25" y="60">3.3V</text><rect x="0" y="55" width="10" height="5" fill="#e74c3c"/>
        <text x="25" y="80">GND</text><rect x="0" y="75" width="10" height="5" fill="black"/>
        <text x="25" y="100">IO15 (Z1)</text><rect x="0" y="95" width="10" height="5" fill="#3498db"/>
        <text x="25" y="120">IO16 (Z2)</text><rect x="0" y="115" width="10" height="5" fill="#3498db"/>
        <text x="25" y="140">IO17 (Z3)</text><rect x="0" y="135" width="10" height="5" fill="#3498db"/>
        <text x="25" y="160">IO14 (Door)</text><rect x="0" y="155" width="10" height="5" fill="#2ecc71"/>
        <text x="25" y="180">IO13 (Fan)</text><rect x="0" y="175" width="10" height="5" fill="#e67e22"/>
        
        <!-- Safety Pins -->
        <text x="25" y="220">IO6 (SafeRelay)</text><rect x="0" y="215" width="10" height="5" fill="#e74c3c"/>
        <text x="25" y="240">IO7 (Buzzer)</text><rect x="0" y="235" width="10" height="5" fill="#e74c3c"/>

        <!-- Thermocouple Pins -->
        <text x="25" y="280">IO10 (CS)</text><rect x="0" y="275" width="10" height="5" fill="#9b59b6"/>
        <text x="25" y="300">IO11 (CLK)</text><rect x="0" y="295" width="10" height="5" fill="#9b59b6"/>
        <text x="25" y="320">IO12 (DO)</text><rect x="0" y="315" width="10" height="5" fill="#9b59b6"/>
    </g>

    <!-- Right Pins (Display & Power In) -->
    <g font-size="10" fill="white" text-anchor="start">
        <text x="175" y="60">VIN (5V)</text><rect x="190" y="55" width="10" height="5" fill="#e74c3c"/>
        <text x="175" y="80">GND</text><rect x="190" y="75" width="10" height="5" fill="black"/>
        <text x="175" y="100">IO5 (CS)</text><rect x="190" y="95" width="10" height="5" fill="#f1c40f"/>
        <text x="175" y="120">IO4 (RST)</text><rect x="190" y="115" width="10" height="5" fill="#f1c40f"/>
        <text x="175" y="140">IO2 (DC)</text><rect x="190" y="135" width="10" height="5" fill="#f1c40f"/>
        <text x="175" y="160">IO23 (MOSI)</text><rect x="190" y="155" width="10" height="5" fill="#f1c40f"/>
        <text x="175" y="180">IO18 (SCK)</text><rect x="190" y="175" width="10" height="5" fill="#f1c40f"/>
        <text x="175" y="200">IO19 (MISO)</text><rect x="190" y="195" width="10" height="5" fill="#f1c40f"/>
    </g>
  </g>

  <!-- 4. Display ILI9341 -->
  <g transform="translate(800, 50)">
    <rect width="240" height="180" fill="url(#grad_lcd)" stroke="#2980b9" stroke-width="4" />
    <rect x="20" y="20" width="200" height="140" fill="#000" />
    <text x="120" y="90" text-anchor="middle" fill="#0f0" font-family="monospace">STATUS: IDLE</text>
    <text x="120" y="110" text-anchor="middle" fill="#0f0" font-family="monospace">TEMP: 24.5 C</text>
    <text x="120" y="15" fill="white" text-anchor="middle" font-weight="bold">TFT Display ILI9341</text>
    
    <!-- Pin Headers Bottom -->
    <g transform="translate(0, 180)">
        <rect x="10" y="0" width="10" height="10" fill="#e74c3c" /><text x="15" y="25" text-anchor="middle" font-size="8">VCC</text>
        <rect x="30" y="0" width="10" height="10" fill="black" /><text x="35" y="25" text-anchor="middle" font-size="8">GND</text>
        <rect x="50" y="0" width="10" height="10" fill="#f1c40f" /><text x="55" y="25" text-anchor="middle" font-size="8">CS</text>
        <rect x="70" y="0" width="10" height="10" fill="#f1c40f" /><text x="75" y="25" text-anchor="middle" font-size="8">RST</text>
        <rect x="90" y="0" width="10" height="10" fill="#f1c40f" /><text x="95" y="25" text-anchor="middle" font-size="8">DC</text>
        <rect x="110" y="0" width="10" height="10" fill="#f1c40f" /><text x="115" y="25" text-anchor="middle" font-size="8">MOSI</text>
        <rect x="130" y="0" width="10" height="10" fill="#f1c40f" /><text x="135" y="25" text-anchor="middle" font-size="8">SCK</text>
        <rect x="150" y="0" width="10" height="10" fill="#e74c3c" /><text x="155" y="25" text-anchor="middle" font-size="8">LED</text>
        <rect x="170" y="0" width="10" height="10" fill="#f1c40f" /><text x="175" y="25" text-anchor="middle" font-size="8">MISO</text>
    </g>
  </g>

  <!-- 5. Thermocouple MAX31855 -->
  <g transform="translate(50, 450)">
    <rect width="80" height="100" fill="#8e44ad" stroke="#6c3483" stroke-width="2" />
    <text x="40" y="20" text-anchor="middle" fill="white" font-weight="bold" font-size="10">MAX31855</text>
    <circle cx="20" cy="50" r="5" fill="#f39c12" /><text x="30" y="55" font-size="10" fill="white">K+</text>
    <circle cx="20" cy="70" r="5" fill="#f39c12" /><text x="30" y="75" font-size="10" fill="white">K-</text>
    
    <!-- Logic Pins Right -->
    <rect x="70" y="30" width="10" height="5" fill="#e74c3c" /><text x="65" y="35" text-anchor="end" font-size="8" fill="white">3V3</text>
    <rect x="70" y="45" width="10" height="5" fill="black" /><text x="65" y="50" text-anchor="end" font-size="8" fill="white">GND</text>
    <rect x="70" y="60" width="10" height="5" fill="#9b59b6" /><text x="65" y="65" text-anchor="end" font-size="8" fill="white">CS</text>
    <rect x="70" y="75" width="10" height="5" fill="#9b59b6" /><text x="65" y="80" text-anchor="end" font-size="8" fill="white">SCK</text>
    <rect x="70" y="90" width="10" height="5" fill="#9b59b6" /><text x="65" y="95" text-anchor="end" font-size="8" fill="white">DO</text>
  </g>

  <!-- 6. SSR Relays -->
  <g transform="translate(800, 300)">
    <!-- SSR 1 -->
    <g>
        <rect width="100" height="80" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" />
        <text x="50" y="20" text-anchor="middle" font-weight="bold">SSR 1</text>
        <text x="10" y="50" font-size="10">DC+</text><rect x="0" y="45" width="5" height="5" fill="#3498db" />
        <text x="10" y="70" font-size="10">DC-</text><rect x="0" y="65" width="5" height="5" fill="black" />
        <text x="60" y="50" font-size="10">LOAD</text>
    </g>
    <!-- SSR 2 -->
    <g transform="translate(0, 100)">
        <rect width="100" height="80" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" />
        <text x="50" y="20" text-anchor="middle" font-weight="bold">SSR 2</text>
        <text x="10" y="50" font-size="10">DC+</text><rect x="0" y="45" width="5" height="5" fill="#3498db" />
        <text x="10" y="70" font-size="10">DC-</text><rect x="0" y="65" width="5" height="5" fill="black" />
    </g>
    <!-- SSR 3 -->
    <g transform="translate(0, 200)">
        <rect width="100" height="80" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" />
        <text x="50" y="20" text-anchor="middle" font-weight="bold">SSR 3</text>
        <text x="10" y="50" font-size="10">DC+</text><rect x="0" y="45" width="5" height="5" fill="#3498db" />
        <text x="10" y="70" font-size="10">DC-</text><rect x="0" y="65" width="5" height="5" fill="black" />
    </g>
  </g>
  
  <!-- 7. Safety Relay -->
  <g transform="translate(800, 620)">
      <rect width="120" height="100" fill="#c0392b" stroke="#922b21" stroke-width="3" rx="5" />
      <text x="60" y="25" text-anchor="middle" fill="white" font-weight="bold">SAFETY RELAY</text>
      <text x="60" y="45" text-anchor="middle" fill="white" font-size="10">220V AC CUTOFF</text>
      <text x="10" y="70" fill="white" font-size="10">IN</text><rect x="0" y="65" width="5" height="5" fill="#f1c40f" />
      <text x="10" y="90" fill="white" font-size="10">GND</text><rect x="0" y="85" width="5" height="5" fill="black" />
  </g>

  <!-- 8. Buzzer -->
  <g transform="translate(200, 500)">
      <circle cx="30" cy="30" r="30" fill="#2c3e50" />
      <circle cx="30" cy="30" r="10" fill="#e74c3c" />
      <text x="30" y="75" text-anchor="middle" font-weight="bold">BUZZER</text>
      <text x="0" y="35" fill="white" font-size="10">+</text>
  </g>

  <!-- 9. Fan Control -->
  <g transform="translate(450, 650)">
    <rect width="80" height="80" fill="#34495e" rx="40" />
    <text x="40" y="45" text-anchor="middle" fill="white" font-weight="bold">FAN</text>
    
    <!-- MOSFET -->
    <g transform="translate(-80, 10)">
        <rect width="40" height="40" fill="#2c3e50" stroke="black" />
        <text x="20" y="25" text-anchor="middle" fill="white" font-size="8">MOSFET</text>
        <text x="0" y="10" font-size="8">G</text>
        <text x="20" y="45" font-size="8">S</text>
        <text x="20" y="0" font-size="8">D</text>
    </g>
    
    <!-- Resistors -->
    <rect x="-120" y="20" width="30" height="10" fill="#f1c40f" stroke="black" />
    <text x="-105" y="15" text-anchor="middle" font-size="8">220R</text>
    
    <rect x="-80" y="60" width="10" height="30" fill="#f1c40f" stroke="black" />
    <text x="-95" y="80" text-anchor="middle" font-size="8">10k</text>
  </g>
  
  <!-- 10. Door Switch -->
  <g transform="translate(200, 350)">
     <rect width="60" height="60" fill="#95a5a6" stroke="black" />
     <circle cx="30" cy="30" r="10" fill="#e74c3c" />
     <text x="30" y="55" text-anchor="middle" font-size="10">DOOR</text>
     <rect x="60" y="10" width="10" height="5" fill="#2ecc71" /><text x="75" y="15" font-size="8">NO</text>
     <rect x="60" y="45" width="10" height="5" fill="black" /><text x="75" y="50" font-size="8">COM</text>
  </g>

  <!-- ================= WIRES ================= -->
  
  <!-- 12V Lines -->
  <path d="M110 210 L110 690 L490 690" stroke="#f39c12" stroke-width="3" fill="none" /> <!-- PSU V+ to Fan + -->
  <path d="M110 210 L210 180" stroke="#f39c12" stroke-width="3" fill="none" /> <!-- PSU V+ to Buck IN+ -->

  <!-- GND Lines (Thick Black) -->
  <path d="M40 210 L40 750 L1200 750" stroke="black" stroke-width="4" fill="none" /> <!-- Main GND Bus -->
  <path d="M40 210 L210 200" stroke="black" stroke-width="2" fill="none" /> <!-- PSU V- to Buck IN- -->
  <path d="M290 200 L400 200 L400 750" stroke="black" stroke-width="2" fill="none" /> <!-- Buck OUT- to Bus -->
  <path d="M640 275 L680 275 L680 750" stroke="black" stroke-width="2" fill="none" /> <!-- ESP GND to Bus -->
  <path d="M800 365 L780 365 L780 750" stroke="black" stroke-width="2" fill="none" /> <!-- SSR1 - -->
  <path d="M800 465 L780 465 L780 750" stroke="black" stroke-width="2" fill="none" /> <!-- SSR2 - -->
  <path d="M800 565 L780 565 L780 750" stroke="black" stroke-width="2" fill="none" /> <!-- SSR3 - -->
  <path d="M120 495 L140 495 L140 750" stroke="black" stroke-width="2" fill="none" /> <!-- MAX31855 GND -->
  <path d="M830 230 L830 210 L680 210 L680 750" stroke="black" stroke-width="2" fill="none" /> <!-- Display GND -->
  <path d="M390 685 L390 750" stroke="black" stroke-width="2" fill="none" /> <!-- MOSFET Source -->
  <path d="M800 705 L780 705 L780 750" stroke="black" stroke-width="2" fill="none" /> <!-- Safety Relay GND -->

  <!-- 5V Lines (Red) -->
  <path d="M290 180 L640 255" stroke="#e74c3c" stroke-width="3" fill="none" /> <!-- Buck OUT+ to ESP VIN -->
  <path d="M640 255 L780 685" stroke="#e74c3c" stroke-width="2" fill="none" /> <!-- 5V to Safety Relay VCC -->
  
  <!-- 3.3V Lines (Pink) -->
  <path d="M450 255 L400 255 L400 480 L120 480" stroke="#ff6b6b" stroke-width="2" fill="none" /> <!-- ESP 3V3 to MAX31855 -->
  <path d="M450 255 L420 255 L420 10 L810 10 L810 230" stroke="#ff6b6b" stroke-width="2" fill="none" /> <!-- ESP 3V3 to Display VCC -->
  
  <!-- Signal Lines -->
  <!-- Fan Control (Orange) -->
  <path d="M450 375 L360 375 L360 675 L330 675" stroke="#e67e22" stroke-width="2" fill="none" /> 
  
  <!-- SSR Control (Blue) -->
  <path d="M450 295 L800 345" stroke="#3498db" stroke-width="2" fill="none" /> <!-- Z1 -->
  <path d="M450 315 L800 445" stroke="#3498db" stroke-width="2" fill="none" /> <!-- Z2 -->
  <path d="M450 335 L800 545" stroke="#3498db" stroke-width="2" fill="none" /> <!-- Z3 -->

  <!-- Safety Control (Red) -->
  <path d="M450 415 L800 685" stroke="#c0392b" stroke-width="2" fill="none" /> <!-- Safety Relay Trigger -->
  <path d="M450 435 L230 530" stroke="#e74c3c" stroke-width="2" fill="none" /> <!-- Buzzer Trigger -->

  <!-- Display SPI (Yellow) -->
  <path d="M640 295 L850 295 L850 230" stroke="#f1c40f" stroke-width="2" fill="none" /> <!-- CS -->
  <path d="M640 315 L870 315 L870 230" stroke="#f1c40f" stroke-width="2" fill="none" /> <!-- RST -->
  <path d="M640 335 L890 335 L890 230" stroke="#f1c40f" stroke-width="2" fill="none" /> <!-- DC -->
  <path d="M640 355 L910 355 L910 230" stroke="#f1c40f" stroke-width="2" fill="none" /> <!-- MOSI -->
  <path d="M640 375 L930 375 L930 230" stroke="#f1c40f" stroke-width="2" fill="none" /> <!-- SCK -->
  
  <!-- Thermocouple SPI (Purple) -->
  <path d="M450 475 L120 510" stroke="#9b59b6" stroke-width="2" fill="none" /> <!-- CS -->
  <path d="M450 495 L120 525" stroke="#9b59b6" stroke-width="2" fill="none" /> <!-- CLK -->
  <path d="M450 515 L120 540" stroke="#9b59b6" stroke-width="2" fill="none" /> <!-- DO -->

  <!-- Door Switch (Green) -->
  <path d="M450 355 L260 355 L260 360" stroke="#2ecc71" stroke-width="2" fill="none" />
  <path d="M260 395 L260 750" stroke="black" stroke-width="2" fill="none" /> <!-- Switch to GND -->

</svg>