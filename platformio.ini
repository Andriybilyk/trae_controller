[platformio]
src_dir = main

[env:esp32s3-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1 ; Generic ESP32-S3 DevKitC (base for N16R8 modules)
framework = espidf
monitor_speed = 115200
upload_speed = 115200
upload_port = COM5
monitor_filters = esp32_exception_decoder
board_build.filesystem = littlefs

; --- Specific ESP32-S3-WROOM-1-N16R8 Configuration ---
; N16R8 = 16MB Flash (Quad SPI) + 8MB PSRAM (Octal SPI)
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = partitions_custom.csv
board_upload.flash_size = 16MB
; Note: PSRAM Octal mode (OPI) is configured in sdkconfig.defaults

lib_deps = 
    ; lovyan03/LovyanGFX @ ^1.1.12 ; Managed by idf_component.yml

build_flags = 
    -D BOARD_HAS_PSRAM
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -D LV_COMP_CONF_INCLUDE_SIMPLE
    -D LV_FONT_MONTSERRAT_48=1
    -D LV_FONT_SUBPX=1
    -D LV_COLOR_DEPTH=16
    -D CONFIG_HTTPD_WS_SUPPORT=1
