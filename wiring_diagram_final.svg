    .wire-control { stroke: #f5a623; stroke-width: 1.5; fill: none; }
    .wire-ac { stroke: #c23b22; stroke-width: 3; fill: none; }
  </style>

  <rect width="100%" height="100%" class="bg"/>

  <title>Фінальна схема підключення контролера печі</title>
  <text x="600" y="40" text-anchor="middle" class="title">Фінальна схема підключення (без DC/DC ізолятора)</text>

