  <text x="785" y="414" class="pin-label">In-</text><circle id="ssr_in_neg" cx="800" cy="410" r="3" fill="#333"/>

  <!-- Buzzer Pins -->
  <text x="115" y="480" class="pin-label">+</text><circle id="buzz_pos" cx="125" cy="470" r="3" fill="#f5a623"/>
  <text x="135" y="480" class="pin-label">-</text><circle id="buzz_neg" cx="135" cy="470" r="3" fill="#333"/>

  <!-- WIRING -->
  <!-- Power Distribution -->
  <path d="M 70 720 v -20 h 480 v -280" class="wire-5v"/> <!-- PSU+ to ESP 5V -->
  <path d="M 130 720 v -10 h 420 v -270" class="wire-gnd"/> <!-- PSU- to ESP GND -->
  
  <!-- 5V to Components -->
  <path d="M 550 420 H 600 v -260 H 800" class="wire-5v"/> <!-- ESP 5V to Relay VCC -->

  <!-- 3.3V to MAX6675 -->
  <path d="M 550 460 H 300 v -170 H 50" class="wire-3v3"/> <!-- ESP 3.3V to MAX VCC -->

  <!-- GND to Components -->
  <path d="M 550 440 H 620 v -260 H 800" class="wire-gnd"/> <!-- ESP GND to Relay GND -->
  <path d="M 550 440 H 640 v -30 H 800" class="wire-gnd"/> <!-- ESP GND to SSR In- -->
  <path d="M 550 440 H 250 v -130 H 50" class="wire-gnd"/> <!-- ESP GND to MAX GND -->
  <path d="M 550 440 H 220 v 30 H 135" class="wire-gnd"/> <!-- ESP GND to Buzzer - -->
  
  <!-- SPI Wiring -->
  <path d="M 170 290 H 300 v -50 H 450" class="wire-spi"/> <!-- SO to P11 -->
  <path d="M 170 310 H 320 v -40 H 450" class="wire-spi"/> <!-- CS to P12 -->
  <path d="M 170 330 H 340 v -30 H 450" class="wire-spi"/> <!-- SCK to P13 -->

  <!-- Control Wiring -->
  <path d="M 800 200 H 600 v 10 H 450" class="wire-control"/> <!-- Relay IN to P10 -->
  <path d="M 800 370 H 620 v -190 H 450" class="wire-control"/> <!-- SSR+ to P1 -->
  <path d="M 125 470 v -50 H 200 v -90 H 450" class="wire-control"/> <!-- Buzzer+ to P5 -->

  <!-- High Voltage Part -->
  <g transform="translate(800, 550)">
    <text x="150" y="-10" text-anchor="middle" class="label" fill="#c23b22">ВИСОКА НАПРУГА 220В</text>
    <path d="M 0 50 L 50 50" class="wire-ac"/><text x="-20" y="54">AC-L</text>
    <rect x="50" y="45" width="40" height="10" class="component-body"/><text x="70" y="40">Fuse</text>
    <path d="M 90 50 L 110 50 V 0 H 120 V 50 L 140 50" class="wire-ac"/><text x="115" y="-10">Safety Relay</text>
    <path d="M 140 50 L 160 50 V 100 H 170 V 50 L 190 50" class="wire-ac"/><text x="165" y="120">SSR</text>
    <path d="M 190 50 L 220 50" class="wire-ac"/><circle cx="220" cy="50" r="4" fill="#c23b22"/>
    <text x="230" y="54">To Heater (L)</text>

    <path d="M 0 150 L 220 150" class="wire-ac"/><text x="-20" y="154">AC-N</text><circle cx="220" cy="150" r="4" fill="#c23b22"/>
    <text x="230" y="154">To Heater (N)</text>
