  <!-- PINS & LABELS -->
  <!-- ESP32 Pins -->
  <text x="440" y="184" text-anchor="end" class="pin-label">GPIO 1</text><circle id="esp_p1" cx="450" cy="180" r="3" fill="#f5a623"/>
  <text x="440" y="214" text-anchor="end" class="pin-label">GPIO 10</text><circle id="esp_p10" cx="450" cy="210" r="3" fill="#f5a623"/>
  <text x="440" y="244" text-anchor="end" class="pin-label">GPIO 11</text><circle id="esp_p11" cx="450" cy="240" r="3" fill="#4a90e2"/>
  <text x="440" y="274" text-anchor="end" class="pin-label">GPIO 12</text><circle id="esp_p12" cx="450" cy="270" r="3" fill="#4a90e2"/>
  <text x="440" y="304" text-anchor="end" class="pin-label">GPIO 13</text><circle id="esp_p13" cx="450" cy="300" r="3" fill="#4a90e2"/>
  <text x="440" y="334" text-anchor="end" class="pin-label">GPIO 5</text><circle id="esp_p5" cx="450" cy="330" r="3" fill="#f5a623"/>
  <text x="560" y="424" text-anchor="start" class="pin-label">5V</text><circle id="esp_5v" cx="550" cy="420" r="3" fill="#d94545"/>
  <text x="560" y="444" text-anchor="start" class="pin-label">GND</text><circle id="esp_gnd" cx="550" cy="440" r="3" fill="#333"/>
  <text x="560" y="464" text-anchor="start" class="pin-label">3.3V</text><circle id="esp_3v3" cx="550" cy="460" r="3" fill="#e67e22"/>
  
  <!-- Power Supply Pins -->
  <text x="70" y="734" text-anchor="middle" class="pin-label">+V</text><circle id="psu_v_pos" cx="70" cy="720" r="3" fill="#d94545"/>
  <text x="130" y="734" text-anchor="middle" class="pin-label">-V</text><circle id="psu_v_neg" cx="130" cy="720" r="3" fill="#333"/>

  <!-- MAX6675 Pins -->
  <text x="40" y="294" class="pin-label">VCC</text><circle id="max_vcc" cx="50" cy="290" r="3" fill="#e67e22"/>
  <text x="40" y="314" class="pin-label">GND</text><circle id="max_gnd" cx="50" cy="310" r="3" fill="#333"/>
  <text x="180" y="294" class="pin-label">SO</text><circle id="max_so" cx="170" cy="290" r="3" fill="#4a90e2"/>
  <text x="180" y="314" class="pin-label">CS</text><circle id="max_cs" cx="170" cy="310" r="3" fill="#4a90e2"/>
  <text x="180" y="334" class="pin-label">SCK</text><circle id="max_sck" cx="170" cy="330" r="3" fill="#4a90e2"/>

  <!-- Safety Relay Pins -->
  <text x="790" y="164" class="pin-label">VCC</text><circle id="relay_vcc" cx="800" cy="160" r="3" fill="#d94545"/>
  <text x="790" y="184" class="pin-label">GND</text><circle id="relay_gnd" cx="800" cy="180" r="3" fill="#333"/>
  <text x="790" y="204" class="pin-label">IN</text><circle id="relay_in" cx="800" cy="200" r="3" fill="#f5a623"/>
  
