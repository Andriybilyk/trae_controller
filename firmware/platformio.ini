[platformio]
default_envs = weact_esp32s3_n16r2

[env:weact_esp32s3_n16r2]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; WeAct S3 N16R2 Specifics
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi 
; N16R2 usually has Quad Flash and Octal PSRAM or Quad PSRAM. 
; R2 = 2MB PSRAM (Quad). R8 = 8MB (Octal). 
; For N16R2 (Quad PSRAM), use qio_qspi or just enable PSRAM.
; Safest for generic S3 with PSRAM:
build_flags = 
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1
    -D TFT_MISO=19
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_CS=5
    -D TFT_DC=2
    -D TFT_RST=4
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=27000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000

lib_deps =
    adafruit/Adafruit MAX31855 library @ ^1.3.0
    bblanchon/ArduinoJson @ ^6.21.3
    me-no-dev/ESP Async WebServer @ ^1.2.3
    dlloydev/QuickPID @ ^3.1.9
    br3ttb/PID @ ^1.2.1
    https://github.com/tzapu/WiFiManager.git
