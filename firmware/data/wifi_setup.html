<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>TRAE Wi-Fi Setup</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #181b22;
      --line: #2a2f3a;
      --text: #eef1f7;
      --muted: #aab3c3;
      --accent: #22c55e;
      --accent-press: #18a34a;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    .wrap { min-height: 100dvh; display: grid; place-items: center; padding: 12px; }
    .card {
      width: min(100%, 420px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }
    h1 { margin: 0 0 8px; font-size: 20px; line-height: 1.25; }
    p { margin: 0 0 12px; color: var(--muted); font-size: 14px; line-height: 1.35; }
    label { display: block; margin: 8px 0 6px; font-size: 13px; color: var(--muted); }
    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0d0f14;
      color: var(--text);
      padding: 10px 12px;
      font-size: 16px;
    }
    .btn {
      width: 100%;
      min-height: 48px;
      margin-top: 12px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #06230f;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:active { background: var(--accent-press); }
    .btn[disabled] { opacity: .65; cursor: default; }
    .status {
      margin-top: 10px;
      min-height: 18px;
      font-size: 13px;
      color: var(--muted);
      word-wrap: break-word;
    }
    .status.err { color: var(--danger); }
    .status.ok { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card" aria-label="Wi-Fi setup">
      <h1>Налаштування Wi-Fi</h1>
      <p>Введіть назву мережі та пароль. Після збереження контролер спробує підключитися.</p>

      <form id="wifiForm" action="/save_wifi" method="POST" autocomplete="on" novalidate>
        <label for="ssid">SSID (назва мережі)</label>
        <input id="ssid" name="ssid" type="text" maxlength="32" autocapitalize="none" autocomplete="username" spellcheck="false" required>

        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" maxlength="64" autocomplete="current-password">

        <button id="connectBtn" class="btn" type="submit">Підключити</button>
      </form>

      <div id="status" class="status" aria-live="polite"></div>
    </section>
  </div>

  <script>
    const form = document.getElementById('wifiForm');
    const ssid = document.getElementById('ssid');
    const password = document.getElementById('password');
    const btn = document.getElementById('connectBtn');
    const statusEl = document.getElementById('status');

    function setStatus(msg, cls) {
      statusEl.textContent = msg || '';
      statusEl.className = 'status' + (cls ? (' ' + cls) : '');
    }

    function safeTrim(s) {
      return (s || '').replace(/\s+/g, ' ').trim();
    }

    async function safeJson(resp) {
      const t = await resp.text();
      try { return JSON.parse(t); } catch (_) { return null; }
    }

    async function waitForConnected(timeoutMs) {
      const t0 = Date.now();
      while (Date.now() - t0 < timeoutMs) {
        try {
          const r = await fetch('/api/status', { cache: 'no-store' });
          if (r.ok) {
            const j = await safeJson(r);
            if (j && j.wifi_connected) return true;
          }
        } catch (_) {}
        await new Promise(r => setTimeout(r, 500));
      }
      return false;
    }

    function closePortalWindow() {
      // Best-effort close for captive portal webviews/CNA.
      try { window.close(); } catch (_) {}
      setTimeout(() => {
        try { window.location.replace('about:blank'); } catch (_) {}
      }, 500);
      setTimeout(() => {
        try { document.body.innerHTML = '<div style=\"font-family:Arial,sans-serif;padding:16px;color:#111\">Підключено. Вікно можна закрити.</div>'; } catch (_) {}
      }, 1000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const vSsid = safeTrim(ssid.value);
      const vPass = password.value || '';

      if (!vSsid) {
        setStatus('Вкажіть SSID мережі.', 'err');
        ssid.focus();
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Підключення...';
      setStatus('Надсилаю дані мережі...');

      try {
        const body = new URLSearchParams({ ssid: vSsid, password: vPass }).toString();
        const resp = await fetch('/save_wifi', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body
        });
        const data = await safeJson(resp);
        if (!resp.ok || !data || data.status === 'error') {
          setStatus('Не вдалося зберегти дані. Перевірте SSID/пароль.', 'err');
          btn.disabled = false;
          btn.textContent = 'Підключити';
          return;
        }

        setStatus('Підключаюся до Wi-Fi...');
        const ok = await waitForConnected(180000);
        if (ok) {
          setStatus('Підключено успішно.', 'ok');
          setTimeout(closePortalWindow, 1200);
        } else {
          setStatus('Підключення триває довше зазвичай. Дані збережено, контролер ще намагається підключитися.', '');
          btn.disabled = false;
          btn.textContent = 'Оновити статус';
        }
      } catch (_) {
        setStatus('Помилка запиту. Спробуйте ще раз.', 'err');
        btn.disabled = false;
        btn.textContent = 'Підключити';
      }
    });
  </script>
</body>
</html>
